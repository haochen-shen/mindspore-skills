schema_version: "1.1.0"
name: "performance-agent"
display_name: "Performance Agent"
description: "Diagnose throughput, latency, memory, utilization, dataloader, and communication bottlenecks after a MindSpore or torch_npu workload already runs by analyzing performance evidence, validating the most likely bottlenecks, preserving a reusable snapshot, and emitting an actionable report."
version: "0.2.0"

entry:
  type: "manual"
  path: "SKILL.md"

role: "agent"

composes: []

factory:
  card_types:
    - "operator"
    - "trick"
    - "model"
    - "report"

inputs:
  - name: "working_dir"
    type: "path"
    required: false
    description: "Workspace root for the run under diagnosis. Defaults to the current shell path."
  - name: "user_problem"
    type: "string"
    required: true
    description: "Performance symptom description and runtime context."
  - name: "trace_path"
    type: "path"
    required: false
    description: "Profiler trace or exported profiler directory when available."
  - name: "metric_focus"
    type: "enum"
    required: false
    choices: ["throughput", "latency", "memory", "utilization"]
    description: "Primary optimization focus when already known."
  - name: "env_lock"
    type: "path"
    required: false
    description: "Path to an earlier readiness snapshot such as env.lock.json."
  - name: "factory_root"
    type: "path"
    required: false
    description: "Optional local ms-factor or Factory root for supporting tricks, models, or report evidence."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "none"
  filesystem: "workspace-write"

dependencies:
  tools:
    - "bash"
    - "find"
    - "rg"
  python: []

tags:
  - "mindspore"
  - "torch_npu"
  - "ascend"
  - "performance"
  - "optimization"
