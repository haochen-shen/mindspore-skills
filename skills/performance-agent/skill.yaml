schema_version: "1.1.0"
name: "performance-agent"
display_name: "Performance Agent"
description: "Use this skill for Ascend/NPU performance debugging and optimization after a MindSpore or torch_npu job already runs."
version: "0.1.1"

entry:
  type: "manual"
  path: "SKILL.md"

role: "agent"

composes: []

factory:
  card_types:
    - "operator"
    - "trick"

inputs:
  - name: "metric"
    type: "enum"
    required: false
    default: "throughput"
    choices: ["throughput", "latency", "memory"]
    description: "Primary focus area if already known; Ascend profiling evidence still takes priority."

outputs:
  report_schema: "skills/_shared/contract/report.schema.json"
  out_dir_layout: "runs/<run_id>/out/"

permissions:
  network: "optional"
  filesystem: "read"

dependencies:
  tools:
    - "bash"
  python: []

tags:
  - "mindspore"
  - "torch_npu"
  - "ascend"
  - "performance"
  - "optimization"
