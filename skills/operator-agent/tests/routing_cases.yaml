schema_version: "1.0.0"
cases:
  - id: "cpu_custom_access_default"
    title: "CPU default route prefers custom access"
    input:
      api_name: "mindspore.mint.abs"
      target_backend_raw: "CPU"
      problem_type: "operator-gap"
      known_evidence: "The operator is missing on CPU. No specific integration requirement provided."
    expected:
      normalized_backend: "CPU"
      support_options:
        - method: "custom-access"
          status: "recommended"
        - method: "native-framework"
          status: "available"
      best_fit: "custom-access"
      ask_clarification: false
      require_api_resolution: true

  - id: "cpu_native_override"
    title: "CPU native route when deep framework integration is required"
    input:
      api_name: "mindspore.mint.xxx"
      target_backend_raw: "CPU"
      problem_type: "operator-gap"
      known_evidence: "The user explicitly requires deep framework integration inside MindSpore core."
    expected:
      normalized_backend: "CPU"
      support_options:
        - method: "native-framework"
          status: "available"
        - method: "custom-access"
          status: "recommended"
      best_fit: "native-framework"
      ask_clarification: false
      require_api_resolution: true

  - id: "npu_alias_ascend"
    title: "Ascend alias normalizes to NPU and selects native framework"
    input:
      api_name: "mindspore.mint.mul"
      target_backend_raw: "Ascend"
      problem_type: "operator-gap"
      known_evidence: "This is an ACLNN-based implementation task."
    expected:
      normalized_backend: "NPU"
      support_options:
        - method: "native-framework"
          status: "standard"
      best_fit: "native-framework"
      ask_clarification: false
      require_api_resolution: true

  - id: "npu_alias_aclnn"
    title: "aclnn alias normalizes to NPU and selects native framework"
    input:
      api_name: "mindspore.mint.sub"
      target_backend_raw: "aclnn"
      problem_type: "operator-gap"
      known_evidence: "The task is framed as an aclnn adaptation."
    expected:
      normalized_backend: "NPU"
      support_options:
        - method: "native-framework"
          status: "standard"
      best_fit: "native-framework"
      ask_clarification: false
      require_api_resolution: true

  - id: "gpu_roadmap"
    title: "GPU route stays on roadmap"
    input:
      api_name: "mindspore.mint.xxx"
      target_backend_raw: "GPU"
      problem_type: "operator-gap"
      known_evidence: ""
    expected:
      normalized_backend: "GPU"
      support_options:
        - method: "custom-access"
          status: "planned"
        - method: "native-framework"
          status: "planned"
      best_fit: "Roadmap"
      ask_clarification: false
      require_api_resolution: true

  - id: "op_info_verification_branch"
    title: "MindSpore operator requests can require op_info verification"
    input:
      api_name: "mindspore.mint.relu"
      target_backend_raw: "NPU"
      problem_type: "operator-gap"
      known_evidence: "The task also asks for op_info ST coverage and remote validation evidence."
    expected:
      normalized_backend: "NPU"
      support_options:
        - method: "native-framework"
          status: "standard"
      best_fit: "native-framework"
      ask_clarification: false
      require_api_resolution: true
